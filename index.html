            // ─── Visual state ──────────────────────────────────────────────────────────────────
            let _hoverTimeout;

            function hoverNode(id, entering) {
                if (S.selected) return; // don't override selection highlight
                clearTimeout(_hoverTimeout);
                if (entering) {
                    const hSet = highlightSet(id);
                    applyVisuals(hSet);
                } else {
                    _hoverTimeout = setTimeout(() => applyVisuals(), 80);
                }
            }

            function applyVisuals(activeSet) {
                const svg = document.getElementById("graph-svg");
                if (!svg) return;

                // Compute effective active set
                const selSet = S.selected ? highlightSet(S.selected.id) : null;
                const srchSet = searchSet();

                let effective = activeSet || selSet;
                if (srchSet) {
                    effective = effective
                        ? new Set(
                              [...effective].filter((id) => srchSet.has(id)),
                          )
                        : srchSet;
                }

                // Tables hidden inside a collapsed database are represented by
                // the database node — light it (and the rerouted edges) when one
                // of its tables is in the active set.
                if (effective) {
                    const aug = new Set(effective);
                    for (const id of effective) {
                        const rep = visibleRep(id);
                        if (rep) aug.add(rep);
                    }
                    effective = aug;
                }

                const hasDim = !!effective;

                // Nodes
                svg.querySelectorAll(".node-g").forEach((g) => {
                    const id = g.getAttribute("data-id");
                    const vis = !hasDim || effective.has(id);
                    g.style.opacity = vis ? "1" : "0.12";
                });

                // Edges
                svg.querySelectorAll(".edge").forEach((e) => {
                    const src = e.getAttribute("data-src");
                    const tgt = e.getAttribute("data-tgt");
                    const both =
                        !hasDim || (effective.has(src) && effective.has(tgt));

                    if (both && S.selected) {
                        e.setAttribute("stroke", "#60a5fa");
                        e.setAttribute("stroke-width", "2");
                        e.setAttribute("opacity", "0.9");
                        e.setAttribute("marker-end", "url(#arr-hl)");
                    } else if (both) {
                        e.setAttribute("stroke", "#c9d1da");
                        e.setAttribute("stroke-width", "1.5");
                        e.setAttribute("opacity", "1");
                        e.setAttribute("marker-end", "url(#arr)");
                    } else {
                        e.setAttribute("stroke", "#e5e7eb");
                        e.setAttribute("stroke-width", "1");
                        e.setAttribute("opacity", "0.2");
                        e.setAttribute("marker-end", "url(#arr)");
                    }
                });

                // Selection ring
                svg.querySelectorAll(".sel-ring").forEach((r) => r.remove());
                if (S.selected) {
                    const p = S.pos[S.selected.id];
                    if (p) {
                        const ring = rect(
                            p.x - 3,
                            p.y - 3,
                            p.w + 6,
                            p.h + 6,
                            11,
                            "none",
                            "#3b82f6",
                            2.5,
                        );
                        ring.classList.add("sel-ring");
                        ring.style.pointerEvents = "none";
                        svg.appendChild(ring);
                    }
                }
            }

            // ─── Detail panel ──────────────────────────────────────────────────────────
            function select(node) {
                S.selected = node;
                showPanel(node);
                applyVisuals();
            }

            function showPanel(node) {
                const panel = document.getElementById("panel");
                document.getElementById("empty").classList.add("hidden");
                panel.classList.add("open");

                const typeCfg = {
                    source_system: { label: "Source System", color: "#059669" },
                    delivery_mechanism: {
                        label: "Delivery Mechanism",
                        color: "#0d9488",
                    },
                    etl_process: { label: "ETL Process", color: "#2563eb" },
                    source: { label: "Data Source", color: "#0891b2" },
                    server_group: { label: "Server", color: "#0891b2" },
                    database_group: { label: "Database", color: "#0891b2" },
                    process: { label: "Consumer Process", color: "#d97706" },
                    report: { label: "Consumer Report", color: "#7c3aed" },
                };
                const tc = typeCfg[node.type] || {
                    label: node.type,
                    color: "#64748b",
                };
                const sc = assetCfg(node.subtype || "");

                // Badges
                const cc = critCfg(node.criticality);
                const badges = document.getElementById("panel-badges");
                badges.innerHTML = `
    <span style="font-size:18px;color:${sc.color};line-height:1;">${sc.icon}</span>
    <span class="badge" style="background:${tc.color}18;color:${tc.color};border:1.5px solid ${tc.color}33;">${tc.label}</span>
    ${node.subtype ? `<span style="font-size:11.5px;color:#9ca3af;">${node.subtype}</span>` : ""}
    ${cc ? `<span class="badge" style="background:${cc.color};color:#fff;border:1.5px solid ${cc.color};font-weight:700;">⚠ ${cc.label}</span>` : ""}
  `;

                document.getElementById("panel-name").textContent = node.label;
                document.getElementById("panel-meta").textContent = [
                    node.owner ? `Owner: ${node.owner}` : null,
                    node.updated ? `Updated: ${node.updated}` : null,
                ]
                    .filter(Boolean)
                    .join("  ·  ");

                // Impact banner
                const banner = document.getElementById("impact-banner");
                if (S.impactMode) {
                    const ds = allDownstream(node.id);
                    ds.delete(node.id);
                    const n = ds.size;
                    if (n) {
                        const nRpts = [...ds].filter(
                            (id) => findNode(id)?.type === "report",
                        ).length;
                        banner.innerHTML = `⚡ <strong>${n} downstream asset${n !== 1 ? "s" : ""}</strong> impacted if this fails${nRpts ? ` — including ${nRpts} report${nRpts !== 1 ? "s" : ""}` : ""}`;
                        banner.style.display = "block";
                    } else {
                        banner.style.display = "none";
                    }
                } else {
                    banner.style.display = "none";
                }

                // Dep chips
                const ups = upstream(node.id);
                const downs = downstream(node.id);
                document.getElementById("upstream-section").style.display =
                    ups.length ? "" : "none";
                document.getElementById("downstream-section").style.display =
                    downs.length ? "" : "none";
                fillChips("upstream-chips", ups);
                fillChips("downstream-chips", downs);

                // Docs
                const docs = document.getElementById("docs-content");
                if (node.docs) {
                    docs.innerHTML = renderMd(node.docs);
                } else {
                    docs.innerHTML =
                        '<p style="color:#9ca3af;font-size:13px;">No documentation provided.</p>';
                }
                document.getElementById("panel-docs").scrollTop = 0;
            }

            function fillChips(containerId, nodes) {
                const el = document.getElementById(containerId);
                el.innerHTML = "";
                for (const n of nodes) {
                    const cfg = assetCfg(n.subtype || "");
                    const chip = document.createElement("button");
                    chip.className = "chip";
                    chip.innerHTML = `<span class="chip-dot" style="background:${cfg.color}"></span>${n.label}`;
                    chip.onclick = () => select(n);
                    el.appendChild(chip);
                }
            }

            function closePanel() {
                S.selected = null;
                document.getElementById("panel").classList.remove("open");
                document.getElementById("empty").classList.remove("hidden");
                applyVisuals();
            }

            // ─── Minimal markdown renderer ─────────────────────────────────────────────
            function renderMd(md) {
                // Escape HTML
                const e = (s) =>
                    s
                        .replace(/&/g, "&amp;")
                        .replace(/</g, "&lt;")
                        .replace(/>/g, "&gt;");

                // Tables
                md = md.replace(
                    /\|(.+)\|\n\|[-| :]+\|\n((?:\|.+\|\n?)*)/g,
                    (_, hdr, rows) => {
                        const ths = hdr
                            .split("|")
                            .filter((s) => s.trim())
                            .map((s) => `<th>${e(s.trim())}</th>`)
                            .join("");
                        const trs = rows
                            .trim()
                            .split("\n")
                            .map((row) => {
                                const tds = row
                                    .split("|")
                                    .filter((s) => s.trim())
                                    .map((s) => `<td>${e(s.trim())}</td>`)
                                    .join("");
                                return `<tr>${tds}</tr>`;
                            })
                            .join("");
                        return `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
                    },
                );

                // Code blocks
                md = md.replace(
                    /```[\w]*\n?([\s\S]*?)```/g,
                    (_, code) => `<pre><code>${e(code.trim())}</code></pre>`,
                );
                // Inline code
                md = md.replace(/`([^`]+)`/g, (_, c) => `<code>${e(c)}</code>`);
                // Bold
                md = md.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
                // Italic
                md = md.replace(/\*([^*]+)\*/g, "<em>$1</em>");
                // Links
                md = md.replace(
                    /\[([^\]]+)\]\(([^)]+)\)/g,
                    '<a href="$2" target="_blank">$1</a>',
                );
                // Headings
                md = md.replace(/^### (.+)$/gm, "<h3>$1</h3>");
                md = md.replace(/^## (.+)$/gm, "<h2>$1</h2>");
                md = md.replace(/^# (.+)$/gm, "<h1>$1</h1>");
                // Horizontal rules
                md = md.replace(/^[-*_]{3,}$/gm, "<hr>");
                // Blockquotes
                md = md.replace(/^> (.+)$/gm, "<blockquote>$1</blockquote>");
                // Unordered lists
                md = md.replace(/((?:^- .+\n?)+)/gm, (m) => {
                    const items = m
                        .trim()
                        .split("\n")
                        .map((li) => `<li>${li.replace(/^- /, "")}</li>`)
                        .join("");
                    return `<ul>${items}</ul>`;
                });
                // Ordered lists
                md = md.replace(/((?:^\d+\. .+\n?)+)/gm, (m) => {
                    const items = m
                        .trim()
                        .split("\n")
                        .map((li) => `<li>${li.replace(/^\d+\. /, "")}</li>`)
                        .join("");
                    return `<ol>${items}</ol>`;
                });
                // Paragraphs (wrap non-tag lines)
                md = md
                    .split("\n\n")
                    .map((block) => {
                        block = block.trim();
                        if (!block) return "";
                        if (/^<[htupbo]/.test(block)) return block;
                        return `<p>${block}</p>`;
                    })
                    .join("\n");

                return md;
            }

            // ─── Helpers ──────────────────────────────────────────────────────────────────
            function updateMeta() {
                const m = CATALOG.meta?.counts || {};
                const parts = [
                    m.source_systems && `${m.source_systems} systems`,
                    m.sources && `${m.sources} sources`,
                    m.processes && `${m.processes} processes`,
                    m.reports && `${m.reports} reports`,
                    m.edges && `${m.edges} edges`,
                ].filter(Boolean);
                if (CATALOG.meta?.generated) {
                    const d = new Date(CATALOG.meta.generated);
                    parts.push(`Updated ${d.toLocaleDateString()}`);
                }
                document.getElementById("hdr-meta").textContent =
                    parts.join(" · ");
            }

            // ─── Events ────────────────────────────────────────────────────────────────
            document
                .getElementById("graph-svg")
                .addEventListener("click", closePanel);

            document
                .getElementById("panel-close")
                .addEventListener("click", closePanel);

            document
                .getElementById("impact-btn")
                .addEventListener("click", () => {
                    S.impactMode = !S.impactMode;
                    const btn = document.getElementById("impact-btn");
                    btn.classList.toggle("on", S.impactMode);
                    if (S.selected) showPanel(S.selected);
                    applyVisuals();
                });

            function anyExpanded() {
                return Object.keys(S.dbTableIds).some(
                    (dbId) =>
                        S.dbTableIds[dbId].length > 0 &&
                        !S.collapsed.has(dbId),
                );
            }

            function updateCollapseBtn() {
                const btn = document.getElementById("collapse-btn");
                if (!btn) return;
                const dbCount = Object.keys(S.dbTableIds).filter(
                    (d) => S.dbTableIds[d].length > 0,
                ).length;
                btn.style.display = dbCount ? "" : "none";
                btn.textContent = anyExpanded() ? "Collapse all" : "Expand all";
            }

            document
                .getElementById("collapse-btn")
                .addEventListener("click", () => {
                    setAllCollapsed(anyExpanded());
                });

            document.getElementById("search").addEventListener("input", (e) => {
                S.search = e.target.value.trim();
                applyVisuals();
            });

            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape") closePanel();
            });

            // ─── Init ──────────────────────────────────────────────────────────────────
            window.addEventListener("DOMContentLoaded", () => {
                if (typeof CATALOG === "undefined") {
                    document.getElementById("graph-svg").innerHTML =
                        '<text x="24" y="40" fill="#dc2626" font-size="14" font-family="system-ui">catalog.js not found — run: python bundle.py</text>';
                    document.getElementById("hdr-meta").textContent =
                        "catalog.js missing";
                    return;
                }
                buildGroupMaps();
                initCollapseDefaults();
                render();
            });
        </script>
    </body>
</html>
